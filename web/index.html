<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A 100% offline Scrabble game with a computer opponent.">
  <meta name="theme-color" content="#1B5E20">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Scrabble">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Scrabble Offline</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- PWA install support: capture the install prompt and expose helpers the
       Flutter app calls from the "Install app" button. -->
  <script>
    window.deferredPwaPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.deferredPwaPrompt = e;
    });
    window.addEventListener('appinstalled', function () {
      window.deferredPwaPrompt = null;
    });
    window.pwaIsStandalone = function () {
      return (window.matchMedia &&
              window.matchMedia('(display-mode: standalone)').matches) ||
             window.navigator.standalone === true;
    };
    window.pwaInstallAvailable = function () {
      return window.deferredPwaPrompt != null;
    };
    window.pwaPromptInstall = async function () {
      var p = window.deferredPwaPrompt;
      if (!p) return 'unavailable';
      p.prompt();
      var choice = await p.userChoice;
      window.deferredPwaPrompt = null;
      return (choice && choice.outcome) ? choice.outcome : 'dismissed';
    };

    // Register the offline caching service worker ourselves. Flutter's loader
    // only refreshes an existing registration (and ships a no-op worker), so a
    // fresh install would otherwise have no offline cache.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('flutter_service_worker.js')
          .catch(function (e) { console.warn('SW registration failed:', e); });
      });
    }
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
