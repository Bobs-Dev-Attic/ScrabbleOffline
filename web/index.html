<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Scrabbled Offline — a 100% offline word game with a computer opponent.">
  <meta name="theme-color" content="#1B5E20">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Scrabbled">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Scrabbled Offline</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- PWA install support: capture the install prompt and expose helpers the
       Flutter app calls from the "Install app" button. -->
  <script>
    window.deferredPwaPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.deferredPwaPrompt = e;
    });
    window.addEventListener('appinstalled', function () {
      window.deferredPwaPrompt = null;
    });
    window.pwaIsStandalone = function () {
      return (window.matchMedia &&
              window.matchMedia('(display-mode: standalone)').matches) ||
             window.navigator.standalone === true;
    };
    window.pwaInstallAvailable = function () {
      return window.deferredPwaPrompt != null;
    };
    window.pwaPromptInstall = async function () {
      var p = window.deferredPwaPrompt;
      if (!p) return 'unavailable';
      p.prompt();
      var choice = await p.userChoice;
      window.deferredPwaPrompt = null;
      return (choice && choice.outcome) ? choice.outcome : 'dismissed';
    };

    // ---- Update log (for debugging, surfaced in Settings) ----
    window.__pwaLog = [];
    window.pwaLog = function (msg) {
      try {
        var line = new Date().toISOString().substr(11, 12) + '  ' + msg;
        window.__pwaLog.push(line);
        if (window.__pwaLog.length > 200) window.__pwaLog.shift();
        if (window.console && console.debug) console.debug('[pwa] ' + msg);
      } catch (e) {}
    };
    window.pwaGetLog = function () { return window.__pwaLog.join('\n'); };
    window.pwaClearLog = function () { window.__pwaLog = []; };

    // ---- Offline cache state + update detection ----
    window.pwaIsOnline = function () { return navigator.onLine !== false; };
    // Controlled by the SW => the app shell + assets are cached for offline use.
    window.pwaOfflineReady = function () { return !!navigator.serviceWorker.controller; };
    window.__swReg = null;
    window.__swUpdate = false;
    window.__applyingUpdate = false;
    window.pwaUpdateAvailable = function () { return window.__swUpdate === true; };

    // Watch a newly-installing worker and resolve true once it is installed and
    // waiting (i.e. an update is downloaded and ready to apply).
    function __watchInstalling(reg, nw, resolve) {
      if (!nw) return;
      pwaLog('update found — downloading new version…');
      nw.addEventListener('statechange', function () {
        pwaLog('new worker state: ' + nw.state);
        if (nw.state === 'installed' && navigator.serviceWorker.controller) {
          window.__swUpdate = true;
          pwaLog('update ready to apply.');
          if (resolve) { var r = resolve; resolve = null; r('updated'); }
        } else if (nw.state === 'redundant') {
          if (resolve) { var r2 = resolve; resolve = null; r2('latest'); }
        }
      });
    }

    // Reliable, awaitable update check. Resolves to 'updated', 'latest',
    // 'error', or 'unsupported'. Waits for the new worker to finish installing
    // (precaching) instead of guessing with a fixed delay.
    window.pwaCheckForUpdate = function () {
      var reg = window.__swReg;
      if (!('serviceWorker' in navigator) || !reg) {
        pwaLog('check skipped — no service worker registration.');
        return Promise.resolve('unsupported');
      }
      if (reg.waiting && navigator.serviceWorker.controller) {
        window.__swUpdate = true;
        pwaLog('check: an update was already waiting.');
        return Promise.resolve('updated');
      }
      pwaLog('checking server for a new version…');
      return new Promise(function (resolve) {
        var settled = false;
        var done = function (v) {
          if (settled) return; settled = true;
          pwaLog('check result: ' + v);
          resolve(v);
        };
        try {
          reg.addEventListener('updatefound', function () {
            __watchInstalling(reg, reg.installing, done);
          });
          reg.update().then(function () {
            // If nothing is installing/waiting shortly after update(), we are
            // already on the latest version.
            if (reg.waiting && navigator.serviceWorker.controller) {
              window.__swUpdate = true; return done('updated');
            }
            if (reg.installing) { __watchInstalling(reg, reg.installing, done); }
            setTimeout(function () {
              if (!reg.installing && !reg.waiting) done('latest');
            }, 2000);
          }).catch(function (e) {
            pwaLog('update() failed: ' + e);
            done('error');
          });
        } catch (e) { pwaLog('check error: ' + e); done('error'); }
        // Safety net: never hang the UI longer than 30s.
        setTimeout(function () { done(window.__swUpdate ? 'updated' : 'latest'); }, 30000);
      });
    };
    window.pwaApplyUpdate = function () {
      var r = window.__swReg;
      if (r && r.waiting) {
        window.__applyingUpdate = true;
        pwaLog('applying update (activating new worker)…');
        r.waiting.postMessage('SKIP_WAITING');
      } else {
        pwaLog('apply requested but no waiting worker.');
      }
    };
    // Fetch text fresh from the network (bypassing caches). The "?fresh"
    // param tells the service worker to go network-first for this request.
    window.pwaFetchText = async function (url) {
      var sep = url.indexOf('?') >= 0 ? '&' : '?';
      var resp = await fetch(url + sep + 'fresh=' + Date.now(), { cache: 'reload' });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return await resp.text();
    };

    // ---- QR scanning via the browser-native BarcodeDetector (no CDN) ----
    window.pwaScanQrSupported = function () {
      return typeof window.BarcodeDetector !== 'undefined';
    };
    // Opens the camera/photo picker, decodes a QR from the captured image, and
    // resolves the decoded text ('' if none / cancelled). Fully offline.
    window.pwaScanQr = function () {
      if (typeof window.BarcodeDetector === 'undefined') return Promise.resolve('');
      return new Promise(function (resolve) {
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.setAttribute('capture', 'environment');
        input.style.position = 'fixed';
        input.style.left = '-9999px';
        document.body.appendChild(input);
        var settled = false;
        var done = function (v) {
          if (settled) return; settled = true;
          try { document.body.removeChild(input); } catch (e) {}
          resolve(v);
        };
        input.addEventListener('change', function () {
          (async function () {
            try {
              var file = input.files && input.files[0];
              if (!file) return done('');
              var bitmap = await createImageBitmap(file);
              var detector = new window.BarcodeDetector({ formats: ['qr_code'] });
              var codes = await detector.detect(bitmap);
              done(codes && codes.length ? codes[0].rawValue : '');
            } catch (e) { pwaLog('qr scan error: ' + e); done(''); }
          })();
        });
        // If the picker is cancelled there's no change event; resolve after the
        // window regains focus with no file selected.
        window.addEventListener('focus', function onF() {
          window.removeEventListener('focus', onF);
          setTimeout(function () {
            if (!settled && (!input.files || !input.files.length)) done('');
          }, 1000);
        });
        input.click();
      });
    };

    // Nuclear "force update": delete every cache, unregister all service
    // workers, then reload from the network with a cache-busting query. This
    // always recovers an installed app that is stuck on an old version.
    window.pwaHardReset = async function () {
      try {
        pwaLog('hard reset: clearing caches…');
        if (window.caches) {
          var keys = await caches.keys();
          await Promise.all(keys.map(function (k) { return caches.delete(k); }));
        }
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(function (r) { return r.unregister(); }));
        }
      } catch (e) { pwaLog('hard reset error: ' + e); }
      var base = location.href.split('?')[0].split('#')[0];
      location.replace(base + '?fresh=' + Date.now());
    };

    // Register the offline caching service worker ourselves. Flutter's loader
    // only refreshes an existing registration (and ships a no-op worker), so a
    // fresh install would otherwise have no offline cache.
    if ('serviceWorker' in navigator) {
      var __reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        pwaLog('controller changed (new worker active).');
        // Only reload when the user explicitly applied an update.
        if (window.__applyingUpdate && !__reloaded) { __reloaded = true; pwaLog('reloading to finish update…'); window.location.reload(); }
      });
      window.addEventListener('load', function () {
        // updateViaCache:'none' forces the SW script (and imports) to be fetched
        // from the network on every update check, so a new deploy is detected
        // promptly instead of being masked by the HTTP cache.
        navigator.serviceWorker.register('flutter_service_worker.js', { updateViaCache: 'none' }).then(function (reg) {
          window.__swReg = reg;
          pwaLog('service worker registered.');
          if (reg.waiting && navigator.serviceWorker.controller) { window.__swUpdate = true; pwaLog('a previous update is waiting.'); }
          reg.addEventListener('updatefound', function () {
            __watchInstalling(reg, reg.installing, null);
          });
          // Proactively check for a new version on every launch.
          try { reg.update(); } catch (e) {}
        }).catch(function (e) { pwaLog('SW registration failed: ' + e); console.warn('SW registration failed:', e); });
      });
    }
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
